apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: spring-petclinic-monitor
  namespace: monitoring
  labels:
    release: prom
spec:
  namespaceSelector:
    matchNames:
      - staging
      - prod
  selector:
    matchLabels:
      app: spring-petclinic
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s