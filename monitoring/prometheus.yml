global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  - job_name: spring-petclinic-local
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8080

  - job_name: spring-petclinic-k8s
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - spring-petclinic.staging.svc.cluster.local:80
          - spring-petclinic.prod.svc.cluster.local:80
