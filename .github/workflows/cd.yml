name: CD - Staging and Production

on:
  workflow_run:
    workflows: ["Taller DevOps - Pipeline CI/CD"]
    types:
      - completed
    branches:
      - develop

  workflow_dispatch:
    inputs:
      image_tag:
        description: "Tag GHCR a desplegar: SHA completo o latest"
        required: false
        default: "latest"

permissions:
  contents: read
  packages: read

concurrency:
  group: petclinic-cd
  cancel-in-progress: false

jobs:
  deploy-staging:
    name: Deploy automatically to staging
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: [self-hosted, Windows, X64]
    environment: staging

    steps:
      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: Resolve image tag
        shell: powershell
        run: |
          if ("${{ github.event_name }}" -eq "workflow_run") {
            "IMAGE_TAG=${{ github.event.workflow_run.head_sha }}" |
              Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }
          else {
            "IMAGE_TAG=${{ inputs.image_tag }}" |
              Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: Verify minikube cluster
        shell: powershell
        run: |
          kubectl config use-context minikube
          kubectl get nodes

      - name: Apply staging manifests
        shell: powershell
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml -n staging
          kubectl apply -f k8s/secret.yaml -n staging
          kubectl apply -f k8s/deployment.yaml -n staging
          kubectl apply -f k8s/service.yaml -n staging
          kubectl apply -f k8s/hpa.yaml -n staging
          kubectl apply -f k8s/pdb.yaml -n staging
          kubectl apply -f k8s/ingress-staging.yaml

          kubectl set image deployment/spring-petclinic `
            spring-petclinic=ghcr.io/relic7663/spring-petclinic-devops:$env:IMAGE_TAG `
            -n staging

          kubectl rollout status deployment/spring-petclinic `
            -n staging --timeout=240s

          kubectl get pods,svc,hpa,pdb,ingress -n staging

      - name: Smoke test staging
        shell: powershell
        run: |
          $portForward = Start-Process `
            -FilePath "kubectl" `
            -ArgumentList "port-forward","svc/spring-petclinic","18080:80","-n","staging" `
            -PassThru `
            -WindowStyle Hidden

          Start-Sleep -Seconds 10

          try {
            $response = Invoke-WebRequest `
              -UseBasicParsing `
              http://localhost:18080/actuator/health

            if ($response.StatusCode -ne 200) {
              throw "Smoke test de staging fallido"
            }

            Write-Host "Smoke test staging exitoso: HTTP $($response.StatusCode)"
          }
          finally {
            Stop-Process -Id $portForward.Id -Force -ErrorAction SilentlyContinue
          }

  deploy-prod:
    name: Deploy to production after approval
    needs: deploy-staging
    runs-on: [self-hosted, Windows, X64]
    environment: prod

    steps:
      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: Resolve image tag
        shell: powershell
        run: |
          if ("${{ github.event_name }}" -eq "workflow_run") {
            "IMAGE_TAG=${{ github.event.workflow_run.head_sha }}" |
              Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }
          else {
            "IMAGE_TAG=${{ inputs.image_tag }}" |
              Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: Verify minikube cluster
        shell: powershell
        run: |
          kubectl config use-context minikube
          kubectl get nodes

      - name: Apply production manifests
        shell: powershell
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml -n prod
          kubectl apply -f k8s/secret.yaml -n prod
          kubectl apply -f k8s/deployment.yaml -n prod
          kubectl apply -f k8s/service.yaml -n prod
          kubectl apply -f k8s/hpa.yaml -n prod
          kubectl apply -f k8s/pdb.yaml -n prod
          kubectl apply -f k8s/ingress-prod.yaml

          kubectl set image deployment/spring-petclinic `
            spring-petclinic=ghcr.io/relic7663/spring-petclinic-devops:$env:IMAGE_TAG `
            -n prod

          kubectl rollout status deployment/spring-petclinic `
            -n prod --timeout=240s

          kubectl get pods,svc,hpa,pdb,ingress -n prod
