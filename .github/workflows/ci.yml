name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  # =================================================================
  # JOB 1: BUILD, TEST, COVERAGE
  # =================================================================
  test:
    name: Build, Test & Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run tests + JaCoCo check (≥80%)
        run: mvn clean verify --no-transfer-progress

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports
          path: app/target/surefire-reports/

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: app/target/site/jacoco/

  # =================================================================
  # JOB 2: SECURITY SCANS (SAST / SCA)
  # =================================================================
  security:
    name: Security Scans (SAST/SCA)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks - Secret Scanning
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy - Filesystem Scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: app
          format: table
          severity: CRITICAL,HIGH
          exit-code: "0"

  # =================================================================
  # JOB 3: SONARCLOUD (opcional, continue-on-error)
  # =================================================================
  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    continue-on-error: true
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: SonarCloud Scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn clean verify sonar:sonar \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.organization=relic7663 \
            -Dsonar.projectKey=RELIC7663_Proyecto-Devops \
            -Dsonar.branch.name=${{ github.ref_name }} \
            --no-transfer-progress

  # =================================================================
  # JOB 4: DOCKER BUILD + PUSH TO GHCR
  # =================================================================
  docker:
    name: Build & Push Docker Image
    needs: [test, security]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/relic7663/spring-petclinic-devops
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build Docker image (no push yet)
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: false
          load: true
          tags: ghcr.io/relic7663/spring-petclinic-devops:ci-scan

      - name: Trivy - Image Scan
        uses: aquasecurity/trivy-action@0.24.0
        continue-on-error: true
        with:
          image-ref: ghcr.io/relic7663/spring-petclinic-devops:ci-scan
          format: table
          exit-code: "1"
          severity: CRITICAL

      - name: Build and Push to GHCR
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: |
            ghcr.io/relic7663/spring-petclinic-devops:${{ github.sha }}
            ghcr.io/relic7663/spring-petclinic-devops:latest
          labels: ${{ steps.meta.outputs.labels }}
