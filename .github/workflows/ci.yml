name: Taller DevOps - Pipeline CI/CD

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

permissions:
  contents: read
  packages: write

jobs:
  ci:
    name: Build, Test, SAST, SCA & Coverage
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Secret Scanning with Gitleaks
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Maven packages
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('app/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-

    - name: Cache SonarCloud packages
      uses: actions/cache@v4
      with:
        path: ~/.sonar/cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar

    - name: Maven Build, Test & Coverage Gate
      run: mvn clean verify
      working-directory: app

    - name: SonarCloud Analysis
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        mvn sonar:sonar \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.organization=relic7663 \
          -Dsonar.projectKey=RELIC7663_Proyecto-Devops \
          -Dsonar.branch.name=${{ github.ref_name }} \
          -Dsonar.qualitygate.wait=true
      working-directory: app
      continue-on-error: true

    - name: Upload Maven Test Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: surefire-reports
        path: app/target/surefire-reports/

    - name: Upload JaCoCo Coverage Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: jacoco-report
        path: app/target/site/jacoco/

    - name: Trivy FS Scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: 'app'
        format: 'table'
        exit-code: '1'
        severity: 'CRITICAL'

  dast:
    name: OWASP ZAP Baseline
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Start Petclinic locally
      run: mvn -DskipTests spring-boot:start
      working-directory: app

    - name: Wait for health endpoint
      shell: bash
      run: |
        for i in {1..30}; do
          if curl -fsS http://localhost:8080/actuator/health >/dev/null; then
            exit 0
          fi
          sleep 5
        done
        exit 1

    - name: ZAP Baseline Scan
      uses: zaproxy/action-baseline@v0.14.0
      with:
        target: 'http://localhost:8080'
        rules_file_name: security/zap-baseline.conf
        fail_action: false
        artifact_name: zap-baseline-report
        cmd_options: '-a -j'

    - name: Stop Petclinic
      if: always()
      run: mvn spring-boot:stop
      working-directory: app

  docker:
    name: Build and Push Docker Image
    needs: [ci, dast]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: app
        file: app/Dockerfile
        push: true
        tags: |
          ghcr.io/relic7663/spring-petclinic-devops:${{ github.sha }}
          ghcr.io/relic7663/spring-petclinic-devops:latest

    - name: Trivy Image Scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'ghcr.io/relic7663/spring-petclinic-devops:${{ github.sha }}'
        format: 'table'
        exit-code: '1'
        severity: 'CRITICAL'
