name: Taller DevOps - Pipeline CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  # =================================================================
  # JOB 1: VALIDACIÓN, SEGURIDAD Y COBERTURA
  # =================================================================
  ci:
    name: Build, Test, SAST, SCA & Coverage
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Maven packages
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('app/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-

    - name: Cache SonarCloud packages
      uses: actions/cache@v4
      with:
        path: ~/.sonar/cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar

    # Build, test, generación de informe JaCoCo y análisis SonarCloud
    - name: Maven Build, Test, JaCoCo & SonarCloud
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        mvn clean verify sonar:sonar \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.organization=relic7663 \
          -Dsonar.projectKey=RELIC7663_Proyecto-Devops \
          -Dsonar.branch.name=${{ github.ref_name }} \
          -Dsonar.qualitygate.wait=true
      working-directory: app                       # ← AQUÍ LA CORRECCIÓN CLAVE

    # Verificar explícitamente la cobertura ≥80% con JaCoCo
    - name: Check JaCoCo Coverage ≥80%
      run: |
        COVERAGE=$(grep -oP 'Total.*?ctr2">\K[0-9]+' app/target/site/jacoco/index.html | head -1)
        echo "Cobertura total: ${COVERAGE}%"
        if [ "${COVERAGE}" -lt 80 ]; then
          echo "ERROR: cobertura por debajo del 80% (${COVERAGE}%)"
          exit 1
        fi
      shell: bash

    # Escaneo de vulnerabilidades en el sistema de archivos (app/)
    - name: Trivy FS Scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: 'app'                           # ← escanea solo la app
        format: 'table'
        exit-code: '0'
        severity: 'CRITICAL,HIGH'

  # =================================================================
  # JOB 2: CONSTRUIR Y PUBLICAR IMAGEN DOCKER (MULTI‑STAGE)
  # =================================================================
  docker:
    name: Build and Push Docker Image
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # Construye la imagen usando el Dockerfile multi‑stage de app/
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: app                              # ← el contexto es la carpeta app
        file: app/Dockerfile                      # ← ruta exacta del Dockerfile
        push: true
        tags: |
          ghcr.io/relic7663/spring-petclinic-devops:${{ github.sha }}
          ghcr.io/relic7663/spring-petclinic-devops:latest  


    